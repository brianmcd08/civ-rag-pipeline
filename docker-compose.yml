services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://civ:civ@db:5432/civ
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: civ
      POSTGRES_PASSWORD: civ
      POSTGRES_DB: civ
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civ"]
      interval: 5s
      retries: 5

volumes:
  pgdata: