<svg xmlns="http://www.w3.org/2000/svg" width="680" height="492" viewBox="0 0 680 492" font-family="Helvetica, Arial, sans-serif">
<title>civ-rag pipeline evolution from V1 to V5</title>
<desc>Five rows, one per pipeline version V1 through V5, and four columns: parse and route, retrieve, generate, eval. Gray cells are unchanged from the prior version, blue cells are an intentional architecture change, the amber cell marks a known regression in V4 fixed in V5.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="0" y="0" width="680" height="492" fill="#ffffff"/>

<text x="140.5" y="48" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Parse &amp; route</text>
